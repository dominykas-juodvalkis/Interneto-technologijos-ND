<body>

<header class="site-header">
    <div class="site-title">
        <h1>Dirbtinio intelekto naudojimas išmaniuosiuose namuose</h1>
    </div>
    <h2>Susisiekite su mumis</h2>
    <nav>
        <ul class="navbar">
            <li><a href="index.html">Pagrindinis</a></li>
            <li><a href="apie.html">Kaip veikia AI?</a></li>
            <li><a href="kontaktai.html">Kontaktai</a></li>
        </ul>
    </nav>
</header>

<main>

<section>
    <h2>Kontaktų forma</h2>

    <form action="#" method="post">
        <label for="vardas">Vardas:</label>
        <input type="text" id="vardas" name="vardas" required>

        <label for="email">El. paštas:</label>
        <input type="email" id="email" name="email" required>

        <label for="sistema">Dominanti sistema:</label>
        <select id="sistema" name="sistema">
            <option>Google Nest</option>
            <option>Amazon Alexa</option>
            <option>Apple HomeKit</option>
        </select>

        <label for="zinute">Žinutė:</label>
        <textarea id="zinute" name="zinute"></textarea>

        <button type="submit">Siųsti</button>
    </form>

</section>

</main>

</html>
