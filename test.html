<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="AI išmaniųjų namų testavimas">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI išmaniuosiuose namuose | Testavimas</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>

<body class="with-transition">

<header class="site-header">
    <h1>Dirbtinio intelekto naudojimas išmaniuosiuose namuose</h1>
    <h2>AI Testavimas</h2>

    <nav>
        <ul class="navbar">
            <li><a href="index.html">Pagrindinis</a></li>
            <li><a href="apie.html">Apie</a></li>
            <li><a href="test.html">Testavimas</a></li>
            <li><a href="valdymas.html">Valdymas</a></li>
            <li><a href="kontaktai.html">Kontaktai</a></li>
        </ul>
    </nav>

    <div class="theme-toggle">
        <button onclick="toggleTheme()">Dark / Light</button>
    </div>
</header>

<main>
<section class="grid-container">

    <div class="card">
        <h3>Temperatūros jutiklis</h3>
        <p id="sensorTemp">Temperatūra: 22°C</p>
        <button onclick="simulateTemp()">Atnaujinti</button>
    </div>

    <div class="card">
        <h3>Judesio sensorius</h3>
        <p id="sensorMotion">Judesys: nėra</p>
        <button onclick="simulateMotion()">Patikrinti judesį</button>
    </div>

    <div class="card">
        <h3>AI pranešimai</h3>
        <p id="aiMsg">Laukia duomenų...</p>
    </div>

</section>
</main>

<footer>
    <p>&copy; 2026 ND2 projektas</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
